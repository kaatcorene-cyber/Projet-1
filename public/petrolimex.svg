<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" /> <!-- Dark Blue -->
      <stop offset="100%" stop-color="#0f172a" /> <!-- Slate Darker -->
    </linearGradient>
    <linearGradient id="p" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" /> <!-- Light Orange -->
      <stop offset="100%" stop-color="#ea580c" /> <!-- Deep Orange -->
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" />
  <text x="50%" y="54%" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="360" fill="url(#p)" text-anchor="middle" dominant-baseline="middle">P</text>
</svg>
